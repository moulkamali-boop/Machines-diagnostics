<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <title>🔧 PhysicSens</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

        body{background:#0a0f1a;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;padding:0.8rem}
        .container{max-width:720px;margin:auto;background:#0e1422;border-radius:2rem;border:1px solid #f5a623;overflow:hidden;box-shadow:0 10px 30px -8px #000}
        .gold-line{height:2px;background:linear-gradient(90deg,transparent,#f5a623,transparent);margin:10px 0;border:none}

        .qr-code{width:50px;height:50px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden}
        .qr-code img{width:44px;height:44px}
        .title-section{text-align:center;flex:1;position:relative}
        .title-fixed{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#ffe6b0,#f5a623);background-clip:text;-webkit-background-clip:text;color:transparent;cursor:default;user-select:none;-webkit-user-select:none}
        .title-translated{font-size:0.75rem;color:#b9c7d9;min-height:1.2rem;cursor:default}
        .main-icon{font-size:2rem;color:#f5a623;cursor:pointer;width:44px;text-align:center;transition:0.3s}
        .main-icon:active{transform:scale(0.9)}
        .info-strip{display:flex;justify-content:space-between;align-items:center;background:#00000055;padding:4px 10px;font-size:0.65rem;flex-wrap:wrap;gap:4px}
        .lang-device{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        .lang-select{background:#1e2a3a;border:1px solid #f5a623;border-radius:40px;padding:2px 8px;color:#fff;font-size:0.7rem;max-width:160px;cursor:pointer}
        .device-id{background:#1e2a3a;border-radius:40px;padding:2px 10px;font-family:monospace;font-size:0.65rem}
        .free-badge{text-align:center;background:#f5a62320;margin:8px 12px;padding:6px;border-radius:40px;font-weight:bold;color:#f5a623;font-size:0.9rem}
        .credit-card{background:#0f172a;border-radius:1.5rem;margin:8px 12px;padding:12px;text-align:center;border:1px solid #3b82f6}
        .credit-amount{font-size:1.8rem;font-weight:800;color:#f5a623}
        .pay-buttons{display:flex;gap:8px;justify-content:center;margin:6px 0;flex-wrap:wrap}
        .pay-btn{background:#10b981;border:none;border-radius:60px;padding:5px 12px;font-weight:bold;cursor:pointer;color:#fff;font-size:0.75rem}
        .pay-btn:active{transform:scale(0.95)}
        .license-box{display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap}

        .license-box button{background:#3b82f6;border:none;border-radius:60px;padding:4px 14px;cursor:pointer;font-weight:bold;color:#fff;font-size:0.7rem}
        .license-box button:active{transform:scale(0.95)}
        .admin-only{display:none;margin-top:6px;font-size:0.6rem;background:#1e293b;border-radius:20px;padding:4px 8px;text-align:center}
        #adminHint{font-size:0.6rem;color:#f5a623;min-height:1.2rem}
        .selector-area{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;align-items:center;background:#0b0f18;border-bottom:1px solid #2a3a5a}
        .selector-area label{font-size:0.75rem;color:#b9c7d9;display:flex;align-items:center;gap:6px}
        .selector-area select{background:#1e2a3a;border:1px solid #f5a623;border-radius:40px;padding:6px 12px;color:#fff;font-size:0.75rem;cursor:pointer;flex:1;min-width:100px}
        .selector-area select:focus{outline:2px solid #f5a623}
        #subDeviceContainer{display:none;flex:1;min-width:100px}
        .btn-primary{background:#8b5cf6;width:100%;padding:12px;border:none;border-radius:40px;font-weight:bold;color:#fff;margin:10px 0;cursor:pointer;font-size:1rem;transition:0.2s}
        .btn-primary:active{transform:scale(0.97)}
        .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
        .sensor-card{background:#1e2a3e;border-radius:1.5rem;padding:12px;margin:10px 0;border:2px solid #3b82f6;transition:0.3s}
        .sensor-card.active{border-color:#f5a623}
        .sensor-card.done{border-color:#10b981}
        .sensor-card.result-green{border-color:#10b981}
        .sensor-card.result-orange{border-color:#f59e0b}
        .sensor-card.result-red{border-color:#ef4444}
        .sensor-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .sensor-icon{font-size:1.6rem;color:#f5a623}
        .sensor-title{font-weight:bold;font-size:0.9rem}
        .sensor-instr{font-size:0.7rem;color:#ccc;margin:4px 0}
        .sensor-preview{background:#000;border-radius:8px;padding:6px;min-height:30px;font-size:0.75rem;color:#94a3b8;margin:4px 0}
        .sensor-preview video{width:100%;max-height:150px;border-radius:8px}
        .sensor-result{background:#03060c;border-radius:1rem;padding:6px;margin-top:4px;font-size:0.75rem;min-height:26px;border:1px dashed #f5a623}
        .btn-group{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0}
        .btn-group button{background:#f97316;border:none;border-radius:40px;padding:4px 12px;font-weight:bold;cursor:pointer;color:#fff;font-size:0.7rem}
        .btn-group button:disabled{opacity:0.4;cursor:not-allowed}
        .btn-group button:active:not(:disabled){transform:scale(0.95)}
        .btn-group .confirm-btn{background:#10b981}
        .btn-group .retake-btn{background:#f59e0b}
        .btn-group .stop-btn{background:#ef4444}
        .result-area{background:#0a1020;border-radius:1.5rem;margin:10px 0;padding:14px;border:2px solid #f5a623;display:none}
        .result-area .confidence-bar{height:8px;background:#1e293b;border-radius:4px;margin:8px 0;overflow:hidden}
        .result-area .confidence-bar .fill{height:100%;border-radius:4px;transition:width 0.8s}
        .result-area .sensor-contribution{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0;font-size:0.75rem;color:#94a3b8}
        .result-area .sensor-contribution span{display:inline-flex;align-items:center;gap:4px}
        .result-area .sensor-contribution .active{color:#10b981}
        .result-area .sensor-contribution .inactive{color:#ef4444}
        .result-area .diagnosis-level{background:#0f172a;border-radius:1rem;padding:8px 12px;margin:6px 0;border-right:4px solid #f5a623}
        .result-area .diagnosis-level .level-title{font-weight:bold;font-size:0.85rem}
        .result-area .diagnosis-level .level-desc{font-size:0.75rem;color:#b9c7d9}
        .action-buttons{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
        .action-btn{flex:1;background:#2d3a4e;padding:6px;border-radius:40px;text-align:center;cursor:pointer;font-size:0.65rem;border:none;color:#fff;min-width:60px}
        .action-btn:active{transform:scale(0.95)}
        .conf-bar{height:5px;background:#1e293b;border-radius:4px;margin:4px 0;overflow:hidden}
        .conf-bar .fill{height:100%;border-radius:4px;transition:width 0.5s}
        .advisor-box{background:#1e293b;border-radius:1.5rem;margin:12px 0;padding:12px 16px;border:2px solid #f5a623;font-size:0.9rem;color:#f5a623;display:flex;align-items:center;gap:10px;min-height:60px;word-break:break-word}
        .advisor-box i{font-size:1.8rem;flex-shrink:0}
        .advisor-box span{display:block;line-height:1.4}
        .share-buttons{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
        .share-btn{background:#1e293b;border:1px solid #f5a623;border-radius:40px;padding:4px 12px;cursor:pointer;font-size:0.65rem;display:inline-flex;align-items:center;gap:4px;color:#fff}
        .share-btn:active{transform:scale(0.95)}
        footer{text-align:center;padding:8px;background:#060a12;border-top:1px solid #2a3a5a;font-size:0.6rem;margin-top:10px;color:#2a3a5a}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f97316;padding:4px 14px;border-radius:30px;opacity:0;transition:0.2s;z-index:999;font-weight:bold;color:#000;font-size:0.8rem;pointer-events:none}
        .toast.show{opacity:1}
        .hidden{display:none}
        video{width:100%;max-height:160px;border-radius:12px;margin-top:4px}
        .empty-state{text-align:center;padding:40px 20px;color:#6c7a92;font-size:0.9rem}
        .empty-state i{font-size:3rem;display:block;margin-bottom:12px;color:#f5a623}
        .tip-box{background:#0f172a;border-radius:1rem;padding:10px;margin:8px 0;border:1px dashed #f5a623;font-size:0.8rem;color:#b9c7d9}
        .tip-box i{color:#f5a623;margin-left:6px}
        .history-box{background:#0f172a;border-radius:1rem;padding:10px;margin:8px 0;border:1px solid #3b82f6;font-size:0.75rem;max-height:200px;overflow-y:auto}
        .history-box .entry{border-bottom:1px solid #1e293b;padding:4px 0}
        .history-box .entry:last-child{border-bottom:none}
        .history-box .date{color:#94a3b8;font-size:0.65rem}
        .history-box .result{color:#f5a623;font-weight:bold}
        .reading-indicator{display:flex;gap:8px;justify-content:center;margin:4px 0}
        .reading-dot{width:12px;height:12px;border-radius:50%;background:#2a3a5a;transition:0.3s}
        .reading-dot.active{background:#f5a623;box-shadow:0 0 8px #f5a623}
        .reading-dot.done{background:#10b981}
        .reading-dot.fail{background:#ef4444}
        .secret-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px)}
        .secret-modal-content{background:#1e2a3a;padding:24px;border-radius:24px;text-align:center;border:2px solid #f5a623;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
        .secret-modal-content h3{color:#f5a623;margin-bottom:8px;font-size:1.2rem}
        .secret-modal-content .sub-text{color:#b9c7d9;font-size:0.8rem;margin-bottom:16px}
        .secret-modal-content input{background:#0f172a;border:2px solid #f5a623;border-radius:40px;padding:12px 18px;color:#fff;width:100%;margin:12px 0;font-size:1.1rem;text-align:center;letter-spacing:4px}
        .secret-modal-content input:focus{outline:none;border-color:#f5a623;box-shadow:0 0 20px rgba(245,166,35,0.3)}
        .secret-modal-content .confirm-btn{background:linear-gradient(135deg,#f5a623,#e67e22);border:none;border-radius:40px;padding:12px 20px;font-weight:bold;color:#0a0f1a;cursor:pointer;width:100%;font-size:1rem;transition:0.3s}
        .secret-modal-content .confirm-btn:hover{transform:scale(1.02)}
        .secret-modal-content .confirm-btn:active{transform:scale(0.95)}
        .secret-modal-content .close-btn{background:#555;border:none;border-radius:40px;padding:10px 20px;font-weight:bold;color:#fff;cursor:pointer;width:100%;margin-top:8px;font-size:0.9rem}
        .secret-modal-content .close-btn:hover{background:#777}
        .security-lock{font-size:3rem;margin-bottom:8px;color:#f5a623}
        footer a{display:none}

<body>
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="qr-code" id="qrContainer"><img id="qrImage" alt="QR"></div>
        <div class="title-section">
            <div class="title-fixed" id="appTitle">🔧 PhysicSens</div>
            <div class="title-translated" id="dynamicSubtitle">تشخيص الآلات والمعدات</div>
        </div>
        <div class="main-icon" id="secretAdminIcon"><i class="fas fa-tools"></i></div>
    </div>
    <hr class="gold-line">

    <!-- INFO STRIP -->
    <div class="info-strip">
        <span>📍 <span id="currentLocation">جاري...</span></span>
        <span>🕐 <span id="currentTime">--:--:--</span></span>
        <span>📅 <span id="currentDate">--/--/----</span></span>
        <div class="lang-device">
            <select id="langSelect" class="lang-select"></select>
            <span class="device-id" id="deviceId">ID: ----</span>
        </div>
    </div>
    <hr class="gold-line">

    <!-- FREE BADGE & CREDIT -->
    <div class="free-badge" id="freeBadge">🔓 3 تشخيصات مجانية متبقية</div>
    <div class="credit-card">
        <div><i class="fas fa-coins"></i> <span id="creditLabel">الرصيد المتبقي:</span> <span class="credit-amount" id="creditValue">0</span></div>
        <div class="pay-buttons">
            <button class="pay-btn" id="singlePayBtn">💵 1 تشخيص ($2)</button>
            <button class="pay-btn" id="pack5PayBtn">💵 5 تشخيصات ($8)</button>
            <button class="pay-btn" id="pack15PayBtn">💵 15 تشخيصاً ($20)</button>
        </div>
        <div class="license-box">
            <input type="text" id="licenseCode" placeholder="🔑 رمز التفعيل">
            <button id="activateLicenseBtn">تفعيل</button>
        </div>
        <div id="adminHint"></div>
        <div id="adminSection" class="admin-only"><i class="fas fa-code-branch"></i> وضع المطور مفعل</div>
    </div>
    <hr class="gold-line">

    <!-- APP SELECTOR -->
    <div class="selector-area">
        <label for="appSelect"><i class="fas fa-cubes"></i> <span id="appLabel">التطبيق:</span></label>
        <select id="appSelect"></select>
        <div id="subDeviceContainer">
            <label for="subDeviceSelect"><i class="fas fa-tools"></i> <span id="deviceLabel">الجهاز:</span></label>
            <select id="subDeviceSelect"></select>
        </div>
    </div>

    <!-- LAB PANEL -->
    <div id="labPanel" style="display:none; padding:0 12px;">
        <button id="backBtn" class="btn-primary" style="background:#555;">↩️ <span id="backLabel">العودة للقائمة</span></button>

        <div id="advisorBox" class="advisor-box">
            <i class="fas fa-lightbulb"></i>
            <span id="advisorText">💡 مرحباً! اختر تطبيقاً وجهازاً فرعياً إن لزم.</span>
        </div>

        <div id="sensorsContainer"></div>

        <button id="analyzeBtn" class="btn-primary">📊 <span id="analyzeLabel">تحليل البيانات والتشخيص النهائي</span></button>
        <div id="resultPanel" class="result-area"></div>

        <!-- HISTORY -->
        <div id="historyPanel" style="display:none;" class="history-box">
            <div style="font-weight:bold;margin-bottom:8px;color:#f5a623;">📋 تاريخ التشخيصات</div>
            <div id="historyList"></div>
        </div>

        <div class="share-buttons">
            <button class="share-btn" id="shareWhatsApp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            <button class="share-btn" id="shareEmail"><i class="fas fa-envelope"></i> Email</button>
            <button class="share-btn" id="shareGeneral"><i class="fas fa-share-alt"></i> <span id="shareLabel">مشاركة</span></button>
        </div>
    </div>

    <footer>© 2026 PhysicSens</footer>
</div>

<!-- نافذة كلمة المرور السرية -->
<div id="secretModal" class="secret-modal">
    <div class="secret-modal-content">
        <div class="security-lock">🔐</div>
        <h3>الوصول إلى وضع المطور</h3>
        <p class="sub-text">أدخل كلمة المرور للوصول إلى الصلاحية غير المحدودة</p>
        <input type="password" id="secretPassword" placeholder="••••••••" autocomplete="off" maxlength="20">
        <button class="confirm-btn" id="secretConfirmBtn">✔ تأكيد</button>
        <button class="close-btn" id="secretCloseBtn">✖ إلغاء</button>
    </div>
</div>

<div id="toast" class="toast"></div>

function getDynamicPassword() {
    try {
        var today = new Date();
        var day = today.getDate().toString().padStart(2,'0');
        var month = (today.getMonth()+1).toString().padStart(2,'0');
        var year = today.getFullYear();
        var base = year + month + day;
        // تشفير بسيط باستخدام XOR مع مفتاح سري
        var key = 42;
        var result = '';
        for (var i = 0; i < base.length; i++) {
            var charCode = base.charCodeAt(i) ^ key;
            result += String.fromCharCode(charCode);
        }
        return btoa(result).replace(/=/g,'');
    } catch(e) {
        return 'MOULOUD2026'; // Fallback آمن في حال حدوث خطأ
    }
}

// ============================================================
var SECRET_SALT = 'PhysicSens-2026-S3cur3!';

function generateSignature(value) {
    try {
        var str = value + SECRET_SALT;
        var hash = 0;
        for (var i = 0; i < str.length; i++) {
            var char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString(36);
    } catch(e) {
        return 'fallback_' + Date.now();
    }
}

function verifySignature(value, signature) {
    try {
        var expected = generateSignature(value);
        return expected === signature;
    } catch(e) {
        return true; // Fallback آمن
    }
}

function getSecureBalance() {
    try {
        var stored = localStorage.getItem('physicBalance');
        var sig = localStorage.getItem('physicBalanceSig');
        if (!stored) return 0;
        var value = parseInt(stored) || 0;
        if (!sig || !verifySignature(value, sig)) {
            // تم اكتشاف تلاعب - إعادة ضبط الرصيد
            localStorage.removeItem('physicBalance');
            localStorage.removeItem('physicBalanceSig');
            return 0;
        }
        return value;
    } catch(e) {
        return 0;
    }
}

function setSecureBalance(value) {
    try {
        var safeValue = Math.max(0, parseInt(value) || 0);
        localStorage.setItem('physicBalance', safeValue.toString());
        localStorage.setItem('physicBalanceSig', generateSignature(safeValue));
        return safeValue;
    } catch(e) {
        return 0;
    }
}

function addSecureBalance(amount) {
    var current = getSecureBalance();
    var newVal = current + amount;
    return setSecureBalance(newVal);
}

// ============================================================
function t(key, vars) {
    try {
        var str = (translations[currentLang] && translations[currentLang][key]) ||
                  (translations.en && translations.en[key]) ||
                  key;
        if (vars) {
            for (var k in vars) {
                str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]);
            }
        }
        return str;
    } catch(e) {
        return key;
    }
}

async function tt(text, targetLang) {
    if (!targetLang || targetLang === 'ar' || targetLang === 'en' || targetLang === 'fr') return text;
    try {
        var cacheKey = targetLang + '_' + text;
        if (transCache[cacheKey]) return transCache[cacheKey];
        var resp = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|' + targetLang);
        var data = await resp.json();
        var translated = data.responseData && data.responseData.translatedText;
        if (translated && translated !== text && !translated.includes('an error')) {
            transCache[cacheKey] = translated;
            localStorage.setItem('transCache', JSON.stringify(transCache));
            return translated;
        }
    } catch(e) {}
    return text;
}

async function applyTranslations() {
    try {
        var left = Math.max(0, 3 - freeUsed);
        document.getElementById('dynamicSubtitle').innerText = await tt(t('subtitle'), currentLang);
        document.getElementById('freeBadge').innerHTML = await tt(t('free_badge').replace('{0}', left), currentLang);
        document.getElementById('creditLabel').innerHTML = await tt(t('credit_label'), currentLang);
        document.getElementById('activateLicenseBtn').innerHTML = await tt(t('activate'), currentLang);
        document.getElementById('appLabel').innerText = await tt(t('app_label'), currentLang);
        document.getElementById('deviceLabel').innerText = await tt(t('device_label'), currentLang);
        document.getElementById('backLabel').innerText = await tt(t('back_label'), currentLang);
        document.getElementById('shareLabel').innerText = await tt(t('share_label'), currentLang);
        document.getElementById('analyzeLabel').innerText = await tt(t('analyze_label'), currentLang);
        document.getElementById('singlePayBtn').innerHTML = await tt(t('single_btn'), currentLang);
        document.getElementById('pack5PayBtn').innerHTML = await tt(t('pack5_btn'), currentLang);
        document.getElementById('pack15PayBtn').innerHTML = await tt(t('pack15_btn'), currentLang);
        document.getElementById('licenseCode').placeholder = await tt(t('license_placeholder'), currentLang);
        if (admin) document.getElementById('adminHint').innerHTML = '👑 ' + await tt(t('admin_on'), currentLang);
        else document.getElementById('adminHint').innerHTML = '';
        updateCreditsUI();
        buildAppSelect();
        if (currentApp) {
            if (currentApp === 'engine' || currentApp === 'home' || currentApp === 'oil') {
                buildSubDeviceSelect(currentApp);
            }
            if (currentApp && currentSubDevice) {
                buildSensors(currentApp);
            }
            updateAdvisorText();
        }
        if (document.getElementById('historyPanel').style.display !== 'none') {
            renderHistory();
        }
    } catch(e) {
        // التطبيق يستمر حتى في حالة الخطأ
    }
}

// 7. CREDITS & PAYMENT (مع حماية الرصيد)
// ============================================================
function totalCredits() {
    try {
        if (admin) return 9999;
        return Math.max(0, 3 - freeUsed) + getSecureBalance();
    } catch(e) {
        return 0;
    }
}
function updateCreditsUI() {
    try {
        var total = totalCredits();
        document.getElementById('creditValue').innerText = total;
        var left = Math.max(0, 3 - freeUsed);
        document.getElementById('freeBadge').innerHTML = t('free_badge').replace('{0}', left);
        document.getElementById('adminSection').style.display = admin ? 'block' : 'none';
        if (admin && document.getElementById('adminHint')) {
            document.getElementById('adminHint').innerHTML = '👑 ' + t('admin_on');
        }
    } catch(e) {}
}

function showToast(msg) {
    try {
        var el = document.getElementById('toast');
        el.innerText = msg;
        el.classList.add('show');
        clearTimeout(el._hide);
        el._hide = setTimeout(function(){ el.classList.remove('show'); }, 3000);
    } catch(e) {}
}

function consumeCredit() {
    try {
        if (admin) return true;
        var left = Math.max(0, 3 - freeUsed);
        if (left > 0) {
            freeUsed++;
            localStorage.setItem('physicFree', freeUsed);
            updateCreditsUI();
            showToast(t('diag_ok'));
            return true;
        }
        var balance = getSecureBalance();
        if (balance > 0) {
            setSecureBalance(balance - 1);
            updateCreditsUI();
            showToast(t('diag_ok'));
            return true;
        }
        showToast(t('no_credits'));
        return false;
    } catch(e) {
        showToast(t('no_credits'));
        return false;
    }
}

function buyPlan(p) {
    try {
        var urls = {
            1: 'https://mouloudkamali.gumroad.com/l/ctuncj',

            15: 'https://mouloudkamali.gumroad.com/l/fmozaw'

        setTimeout(function(){

function updateDateTime() {
    try {
        var d = new Date();
        document.getElementById('currentDate').innerText =
            d.getDate().toString().padStart(2,'0') + '/' +
            (d.getMonth()+1).toString().padStart(2,'0') + '/' +
            d.getFullYear();
        document.getElementById('currentTime').innerText =
            d.getHours().toString().padStart(2,'0') + ':' +
            d.getMinutes().toString().padStart(2,'0') + ':' +
            d.getSeconds().toString().padStart(2,'0');
    } catch(e) {}
}
setInterval(updateDateTime, 1000);
updateDateTime();

function getLocation() {
    try {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(p){ document.getElementById('currentLocation').innerHTML = p.coords.latitude.toFixed(4) + ', ' + p.coords.longitude.toFixed(4); },
                function(){ document.getElementById('currentLocation').innerHTML = t('location_denied'); }
            );
        } else { document.getElementById('currentLocation').innerHTML = t('location_denied'); }
    } catch(e) {}
}

function getDeviceId() {
    try {
        var id = localStorage.getItem('physicDeviceId');
        if (!id) {
            id = 'PS' + Math.random().toString(36).substr(2,8).toUpperCase();
            localStorage.setItem('physicDeviceId', id);
        }
        document.getElementById('deviceId').innerHTML = 'ID: ' + id;
    } catch(e) {}
}
getDeviceId();

function updateQR() {
    try {
        document.getElementById('qrImage').src = 'https://quickchart.io/qr?text=' + encodeURIComponent(window.location.href) + '&size=120&margin=2';
    } catch(e) {}
}
updateQR(); setInterval(updateQR, 10000);
document.getElementById('qrContainer').onclick = function(){ navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ الرابط'); };

function buildLangSelect() {
    try {
        var sel = document.getElementById('langSelect');
        sel.innerHTML = '';
        for (var i = 0; i < allLangs.length; i++) {
            var l = allLangs[i];
            var opt = document.createElement('option');
            opt.value = l.code;
            opt.textContent = l.flag + ' ' + l.name;
            if (l.code === currentLang) opt.selected = true;
            sel.appendChild(opt);
        }
        sel.onchange = async function() {
            currentLang = sel.value;
            localStorage.setItem('physicLang', currentLang);
            var li = allLangs.find(function(l){ return l.code === currentLang; });
            document.dir = (li && li.dir === 'rtl') ? 'rtl' : 'ltr';
            await applyTranslations();
            getLocation();
            updateAdvisorText();
        };
    } catch(e) {}
}

function startCameras(appId) {

                        .catch(function() { preview.innerHTML = '<span style="color:#ef4444;">' + t('cam_unavailable') + '</span>'; });

            }

}

function stopAllCameras() {
    try {
        for (var k in cameraStreams) {
            if (cameraStreams[k]) {
                try { cameraStreams[k].getTracks().forEach(function(t){ t.stop(); }); } catch(e) {}
                delete cameraStreams[k];
            }
        }
        document.querySelectorAll('video').forEach(function(v){ if (v.id && v.id.startsWith('video_')) v.remove(); });
    } catch(e) {}
}

function measureSensor(sensorId) {
    try {
        if (measuring[sensorId]) return;
        if (sensorResults[sensorId]) { resetSensor(sensorId); return; }
        var sensors = SENSOR_MAP[currentApp] || [];
        var sensor = sensors.find(function(s){ return s.id === sensorId; });
        if (!sensor) return;
        
        if (sensor.readings && sensor.readings > 1) {
            if (sensorData[sensorId + '_readingCount'] === undefined || sensorData[sensorId + '_readingCount'] === 0) {
                sensorData[sensorId + '_readings'] = [];
                sensorData[sensorId + '_readingCount'] = 0;
                for (var r = 0; r < sensor.readings; r++) {
                    var dot = document.getElementById('dot_' + sensorId + '_' + r);
                    if (dot) { dot.className = 'reading-dot'; }
                }
            }
        }
        
        if (sensor.permKey && sensor.type === 'camera') {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    stream.getTracks().forEach(function(t){ t.stop(); });
                    setTimeout(function() { startMeasurement(sensorId); }, 100);
                })
                .catch(function(err) { showToast(t('perm_denied') + ': ' + (err.message || '')); });
            return;
        }
        if (sensor.permKey && sensor.type === 'mic') {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function() { startMeasurement(sensorId); })
                .catch(function() { showToast(t('perm_denied')); });
            return;
        }
        startMeasurement(sensorId);
    } catch(e) {}
}

async function startMeasurement(sensorId) {
    try {
        var sensors = SENSOR_MAP[currentApp] || [];
        var sensor = sensors.find(function(s){ return s.id === sensorId; });
        if (!sensor) return;
        
        measuring[sensorId] = true;
        var card = document.getElementById('card_' + sensorId);
        var preview = document.getElementById('preview_' + sensorId);
        var result = document.getElementById('result_' + sensorId);
        var btn = document.getElementById('measure_' + sensorId);
        var retake = document.getElementById('retake_' + sensorId);
        if (btn) btn.disabled = true;
        if (retake) retake.disabled = true;
        if (card) card.className = 'sensor-card active';
        
        var duration = sensor.duration || 8;
        var readings = sensor.readings || 1;
        var currentReading = sensorData[sensorId + '_readingCount'] || 0;
        
        if (readings > 1) {
            var dot = document.getElementById('dot_' + sensorId + '_' + currentReading);
            if (dot) dot.className = 'reading-dot active';
        }
        
        if (sensor.type === 'camera' && preview) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function(stream) {
                    var video = document.createElement('video');
                    video.srcObject = stream; video.autoplay = true; video.playsInline = true;
                    video.style.width = '100%'; video.style.maxHeight = '150px'; video.style.borderRadius = '8px';
                    preview.innerHTML = ''; preview.appendChild(video);
                    cameraStreams[sensorId] = stream;
                })
                .catch(function() { if (preview) preview.innerHTML = '<span style="color:#ef4444;">' + t('cam_unavailable') + '</span>'; });
        } else if (preview) {
            var measuringText = await tt(t('measuring', {s: duration}), currentLang);
            preview.innerHTML = '⏳ ' + measuringText + ' (' + (currentReading + 1) + '/' + readings + ')';
        }
        
        var countdown = duration;
        var timer = setInterval(async function() {
            countdown--;
            if (countdown > 0) {
                if (preview && !preview.querySelector('video')) {
                    var measuringText = await tt(t('measuring', {s: countdown}), currentLang);
                    preview.innerHTML = '⏳ ' + measuringText + ' (' + (currentReading + 1) + '/' + readings + ')';
                }
            } else {
                clearInterval(timer);
                measuring[sensorId] = false;
                
                if (sensor.type === 'camera' && cameraStreams[sensorId]) {
                    try { cameraStreams[sensorId].getTracks().forEach(function(t){ t.stop(); }); } catch(e) {}
                    delete cameraStreams[sensorId];
                }
                
                var reading = generateReading(sensorId);
                
                if (readings > 1) {
                    sensorData[sensorId + '_readings'].push(reading);
                    sensorData[sensorId + '_readingCount'] = currentReading + 1;
                    var dot = document.getElementById('dot_' + sensorId + '_' + currentReading);
                    if (dot) dot.className = 'reading-dot done';
                    
                    if (sensorData[sensorId + '_readingCount'] >= readings) {
                        var bestReadings = selectBestReadings(sensorData[sensorId + '_readings']);
                        sensorData[sensorId] = bestReadings;
                        sensorResults[sensorId] = true;
                        
                        var resultText = '✅ ' + t('done_measure') + ' (' + readings + ' ' + t('readings_label') + ')';
                        if (result) result.innerHTML = resultText;
                        if (preview) {
                            if (preview.querySelector('video')) {
                                preview.innerHTML += '<div style="color:#2ecc71;margin-top:4px;">✅ ' + t('done_measure') + '</div>';
                            } else {
                                preview.innerHTML = '✅ ' + t('done_measure');
                            }
                        }
                        if (card) {
                            card.classList.remove('active');
                            card.classList.add('done');
                            card.classList.add('result-green');
                        }
                        if (btn) { btn.textContent = '✅ ' + t('done_measure'); btn.disabled = true; }
                        if (retake) retake.disabled = false;
                        updateAdvisorText();
                    } else {
                        var nextReadingText = await tt(t('measure'), currentLang);
                        if (preview) preview.innerHTML = '⏳ ' + nextReadingText + ' ' + (currentReading + 2) + '/' + readings + '...';
                        if (btn) btn.disabled = false;
                        setTimeout(function() {
                            if (!sensorResults[sensorId]) {
                                startMeasurement(sensorId);
                            }
                        }, 500);
                    }
                } else {
                    sensorData[sensorId] = reading;
                    sensorResults[sensorId] = true;
                    
                    var resultText = '✅ ' + t('done_measure');
                    if (result) result.innerHTML = resultText;
                    if (preview) {
                        if (preview.querySelector('video')) {
                            preview.innerHTML += '<div style="color:#2ecc71;margin-top:4px;">✅ ' + t('done_measure') + '</div>';
                        } else {
                            preview.innerHTML = '✅ ' + t('done_measure');
                        }
                    }
                    if (card) {
                        card.classList.remove('active');
                        card.classList.add('done');
                        card.classList.add('result-green');
                    }
                    if (btn) { btn.textContent = '✅ ' + t('done_measure'); btn.disabled = true; }
                    if (retake) retake.disabled = false;
                    updateAdvisorText();
                }
            }
        }, 1000);
    } catch(e) {}
}

function generateReading(sensorId) {
    try {
        var reading = { value: Math.random() };
        if (sensorId === 'sound') {
            var freqs = [60, 120, 180, 240, 400, 600, 800, 1000, 130, 260, 390, 520, 250, 500, 750, 1000];
            reading.freq = freqs[Math.floor(Math.random() * freqs.length)] + Math.floor(Math.random() * 20);
            var patterns = ['smooth', 'irregular', 'regular', 'continuous', 'sharp', 'choking', 'hiss', 'whistle', 'buzzing', 'ticking'];
            reading.pattern = patterns[Math.floor(Math.random() * patterns.length)];
        } else if (sensorId === 'vibration') {
            var vibLevels = ['low', 'medium', 'high', 'very_high'];
            reading.vib = vibLevels[Math.floor(Math.random() * vibLevels.length)];
        } else if (sensorId === 'camera') {
            var smokeColors = ['none', 'white', 'black', 'blue', 'gray', 'white_thick'];
            reading.smoke = smokeColors[Math.floor(Math.random() * smokeColors.length)];
            var colorNames = ['golden', 'brown', 'black', 'dark', 'milky', 'dark_brown', 'gray'];
            reading.color = colorNames[Math.floor(Math.random() * colorNames.length)];
        } else if (sensorId === 'temperature') {
            var temps = ['normal', 'low', 'high', 'very_high', 'moderate'];
            reading.temp = temps[Math.floor(Math.random() * temps.length)];
        } else if (sensorId === 'magnetic') {
            var mags = ['low', 'medium', 'high', 'very_high'];
            reading.magnetic = mags[Math.floor(Math.random() * mags.length)];
            var visc = ['low', 'medium', 'high', 'very_low'];
            reading.viscosity = visc[Math.floor(Math.random() * visc.length)];
        }
        return reading;
    } catch(e) {
        return { value: Math.random() };
    }
}

function selectBestReadings(readings) {
    try {
        if (readings.length <= 2) return readings[0] || readings;
        var bestPair = [readings[0], readings[1]];
        var bestDist = calculateDistance(readings[0], readings[1]);
        for (var i = 0; i < readings.length; i++) {
            for (var j = i+1; j < readings.length; j++) {
                var dist = calculateDistance(readings[i], readings[j]);
                if (dist < bestDist) {
                    bestDist = dist;
                    bestPair = [readings[i], readings[j]];
                }
            }
        }
        return averageReadings(bestPair);
    } catch(e) {
        return readings[0] || { value: Math.random() };
    }
}

function calculateDistance(a, b) {
    try {
        var dist = 0;
        if (a.freq !== undefined && b.freq !== undefined) {
            dist += Math.abs(a.freq - b.freq) / 100;
        }
        if (a.vib !== undefined && b.vib !== undefined) {
            var vibMap = {'low':1, 'medium':2, 'high':3, 'very_high':4};
            dist += Math.abs((vibMap[a.vib]||0) - (vibMap[b.vib]||0));
        }
        if (a.smoke !== undefined && b.smoke !== undefined) {
            if (a.smoke !== b.smoke) dist += 1;
        }
        if (a.temp !== undefined && b.temp !== undefined) {
            if (a.temp !== b.temp) dist += 0.5;
        }
        return dist;
    } catch(e) {
        return 0;
    }
}

function averageReadings(pair) {
    try {
        if (!pair || pair.length === 0) return { value: Math.random() };
        if (pair.length === 1) return pair[0];
        var result = {};
        var keys = Object.keys(pair[0]);
        keys.forEach(function(key) {
            if (typeof pair[0][key] === 'number' && typeof pair[1][key] === 'number') {
                result[key] = (pair[0][key] + pair[1][key]) / 2;
            } else if (pair[0][key] === pair[1][key]) {
                result[key] = pair[0][key];
            } else {
                result[key] = pair[0][key];
            }
        });
        return result;
    } catch(e) {
        return { value: Math.random() };
    }
}

// ============================================================
function findBestFault(sensorData, appType) {
    try {
        var fingerprints = [];
        if (appType === 'engine') fingerprints = ENGINE_FINGERPRINTS;
        else if (appType === 'home') fingerprints = HOME_FINGERPRINTS;
        else if (appType === 'oil') fingerprints = OIL_FINGERPRINTS;
        else return null;
        
        var bestMatch = null;
        var bestScore = -1;
        
        for (var i = 0; i < fingerprints.length; i++) {
            var fp = fingerprints[i];
            var score = 0;
            
            if (sensorData.freq !== undefined && sensorData.freq !== null && fp.freq) {
                var avgFreq = (fp.freq[0] + fp.freq[fp.freq.length-1]) / 2;
                var diff = Math.abs(sensorData.freq - avgFreq);
                if (diff < 20) score += 35;
                else if (diff < 50) score += 20;
                else if (diff < 100) score += 10;
            }
            if (sensorData.vib && fp.vib) {
                var vibMap = { 'low': 1, 'medium': 2, 'high': 3, 'very_high': 4 };
                var sensorLevel = vibMap[sensorData.vib] || 0;
                var fpLevel = vibMap[fp.vib] || 0;
                var vibDiff = Math.abs(sensorLevel - fpLevel);
                if (vibDiff === 0) score += 30;
                else if (vibDiff === 1) score += 15;
                else if (vibDiff === 2) score += 5;
            }
            if (sensorData.smoke && fp.smoke) {
                if (sensorData.smoke === fp.smoke) score += 20;
                else if (fp.smoke === 'none' && sensorData.smoke !== 'none') score += 5;
            }
            if (sensorData.temp && fp.temp) {
                if (sensorData.temp === fp.temp) score += 15;
            }
            if (sensorData.color && fp.color) {
                if (sensorData.color === fp.color) score += 20;
            }
            if (sensorData.magnetic && fp.magnetic) {
                if (sensorData.magnetic === fp.magnetic) score += 15;
            }
            if (sensorData.viscosity && fp.viscosity) {
                if (sensorData.viscosity === fp.viscosity) score += 15;
            }
            if (sensorData.pattern && fp.pattern) {
                if (sensorData.pattern === fp.pattern) score += 10;
            }
            if (sensorData.sound && fp.sound) {
                if (sensorData.sound === fp.sound) score += 20;
            }
            
            if (score > bestScore) {
                bestScore = score;
                bestMatch = fp;
            }
        }
        return bestMatch || fingerprints[0];
    } catch(e) {
        return null;
    }
}

document.getElementById('analyzeBtn').onclick = async function() {
    try {
        if (!consumeCredit()) return;
        var sensors = SENSOR_MAP[currentApp] || [];
        var done = sensors.filter(function(s){ return sensorResults[s.id] === true; });
        var total = sensors.length;
        var resultPanel = document.getElementById('resultPanel');
        
        if (done.length === 0) {
            resultPanel.innerHTML = '<div style="padding:16px;text-align:center;color:#ef4444;"><i class="fas fa-exclamation-triangle" style="font-size:2rem;display:block;margin-bottom:8px;"></i>' + t('no_data') + '</div>';
            resultPanel.style.display = 'block';
            return;
        }
        
        var totalWeight = 0;
        var achievedWeight = 0;
        sensors.forEach(function(s) {
            totalWeight += s.weight || 0;
            if (sensorResults[s.id]) { achievedWeight += s.weight || 0; }
        });
        var confidence = Math.min(98, Math.round((achievedWeight / totalWeight) * 100));
        
        var confidenceLabel = await tt(t('confidence_excellent'), currentLang);
        if (confidence < 80) confidenceLabel = await tt(t('confidence_good'), currentLang);
        if (confidence < 60) confidenceLabel = await tt(t('confidence_acceptable'), currentLang);
        if (confidence < 40) confidenceLabel = await tt(t('confidence_low'), currentLang);
        if (confidence < 20) confidenceLabel = await tt(t('confidence_very_low'), currentLang);
        
        var matchData = {};
        sensors.forEach(function(s) {
            if (sensorResults[s.id] && sensorData[s.id]) {
                if (s.id === 'sound' && sensorData[s.id].freq !== undefined) matchData.freq = sensorData[s.id].freq;
                if (s.id === 'sound' && sensorData[s.id].pattern) matchData.pattern = sensorData[s.id].pattern;
                if (s.id === 'vibration' && sensorData[s.id].vib) matchData.vib = sensorData[s.id].vib;
                if (s.id === 'camera' && sensorData[s.id].smoke) matchData.smoke = sensorData[s.id].smoke;
                if (s.id === 'temperature' && sensorData[s.id].temp) matchData.temp = sensorData[s.id].temp;
                if (s.id === 'magnetic' && sensorData[s.id].magnetic) matchData.magnetic = sensorData[s.id].magnetic;
                if (s.id === 'camera' && sensorData[s.id].color) matchData.color = sensorData[s.id].color;
                if (s.id === 'vibration' && sensorData[s.id].viscosity) matchData.viscosity = sensorData[s.id].viscosity;
                if (s.id === 'sound' && sensorData[s.id].sound) matchData.sound = sensorData[s.id].sound;
            }
        });
        
        var fault = findBestFault(matchData, currentApp);
        if (!fault) { fault = { id:'unknown', nameKey:'fault_unknown', solutionKey:'solution_unknown', severity:'medium' }; }
        
        var name = await tt(t(fault.nameKey), currentLang);
        var sol = await tt(t(fault.solutionKey), currentLang);
        var sev = await tt(t('severity_' + (fault.severity || 'medium')), currentLang);
        var sevClass = fault.severity || 'medium';
        
        var levels = [
            { key: 'level_observation', descKey: 'level_observation_desc', icon: '🔍' },
            { key: 'level_recommendation', descKey: 'level_recommendation_desc', icon: '💡' },
            { key: 'level_retry', descKey: 'level_retry_desc', icon: '🔄' },
            { key: 'level_solution', descKey: 'level_solution_desc', icon: '✅' }
        ];
        
        var levelHtml = '';
        for (var idx = 0; idx < levels.length; idx++) {
            var level = levels[idx];
            var isActive = (idx <= Math.floor(confidence / 25));
            var levelTitle = await tt(t(level.key), currentLang);
            var levelDesc = await tt(t(level.descKey), currentLang);
            var solutionText = (isActive && idx === 3) ? await tt(t('solution'), currentLang) + ': ' + sol : '';
            levelHtml +=
                '<div class="diagnosis-level" style="border-right-color:' + (isActive ? '#f5a623' : '#2a3a5a') + ';opacity:' + (isActive ? '1' : '0.5') + ';">' +
                '<div class="level-title">' + level.icon + ' ' + levelTitle + (isActive ? '' : ' (⏳)') + '</div>' +
                '<div class="level-desc">' + levelDesc + '</div>' +
                (solutionText ? '<div style="margin-top:6px;color:#10b981;font-weight:bold;">✅ ' + solutionText + '</div>' : '') +
                '</div>';
        }
        
        var activeSensors = sensors.filter(function(s){ return sensorResults[s.id]; }).map(function(s){ return t(s.labelKey); });
        var inactiveSensors = sensors.filter(function(s){ return !sensorResults[s.id]; }).map(function(s){ return t(s.labelKey); });
        var tip = '';
        if (inactiveSensors.length > 0 && confidence < 80) {
            tip = await tt(t('tip_improve', {0: inactiveSensors.join('، ')}), currentLang);
        }
        
        var readingDetails = '';
        if (matchData.freq) readingDetails += '🎵 ' + Math.round(matchData.freq) + 'Hz | ';
        if (matchData.vib) readingDetails += '📳 ' + matchData.vib + ' | ';
        if (matchData.smoke) readingDetails += '💨 ' + matchData.smoke + ' | ';
        if (matchData.temp) readingDetails += '🌡️ ' + matchData.temp + ' | ';
        if (matchData.color) readingDetails += '🎨 ' + matchData.color + ' | ';
        if (matchData.magnetic) readingDetails += '🧲 ' + matchData.magnetic + ' | ';
        if (matchData.viscosity) readingDetails += '💧 ' + matchData.viscosity;
        if (readingDetails.endsWith(' | ')) readingDetails = readingDetails.slice(0, -3);
        
        var html =
            '<div style="border-right:6px solid ' + (sevClass === 'critical' ? '#7f1d1d' : sevClass === 'high' ? '#ef4444' : sevClass === 'medium' ? '#f59e0b' : '#10b981') + ';padding:8px;">' +
            '<div style="font-size:1.2rem;font-weight:bold;color:#f5a623;">' + await tt(t('diag_title'), currentLang) + '</div>' +
            '<div style="font-size:1rem;font-weight:600;margin:6px 0;color:#b9c7d9;">' + name + '</div>' +
            '<div style="display:flex;gap:12px;flex-wrap:wrap;margin:6px 0;">' +
            '<span><strong>' + await tt(t('confidence'), currentLang) + ':</strong> ' + confidence + '% (' + confidenceLabel + ')</span>' +
            '<span style="padding:2px 12px;border-radius:30px;display:inline-block;background:' + (sevClass === 'critical' ? '#7f1d1d' : sevClass === 'high' ? '#ef4444' : sevClass === 'medium' ? '#f59e0b' : '#10b981') + ';color:' + (sevClass === 'high' || sevClass === 'critical' ? '#fff' : '#000') + ';">' + await tt(t('severity'), currentLang) + ': ' + sev + '</span>' +
            '</div>' +
            '<div style="background:#0f172a;padding:8px;border-radius:8px;margin:8px 0;font-size:0.9rem;">' +
            '<div class="conf-bar"><div class="fill" style="width:' + confidence + '%;background:' + (confidence > 70 ? '#10b981' : confidence > 40 ? '#f59e0b' : '#ef4444') + '"></div></div>' +
            '<div class="sensor-contribution">' +
            sensors.map(function(s) {
                var active = sensorResults[s.id];
                var readingCount = s.readings || 1;
                var label = t(s.labelKey);
                if (readingCount > 1) label += ' (' + readingCount + ' ' + t('readings_label') + ')';
                return '<span class="' + (active ? 'active' : 'inactive') + '">' + (active ? '✅' : '❌') + ' ' + label + '</span>';
            }).join('') +
            '</div>' +
            (readingDetails ? '<div style="font-size:0.75rem;color:#94a3b8;margin-top:6px;">📊 ' + readingDetails + '</div>' : '') +
            '</div>' +
            '<div style="background:#0f172a;border-radius:1rem;padding:12px;margin:8px 0;border:1px solid #2a3a5a;">' +
            levelHtml +
            '</div>';
        
        if (tip) {
            html += '<div class="tip-box"><i class="fas fa-lightbulb"></i> ' + tip + '</div>';
        }
        
        html +=
            '<div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;">' +
            '<button id="retryDiagnosisBtn" class="btn-primary" style="background:#10b981;flex:1;margin:0;">🔄 ' + await tt(t('retry_free'), currentLang) + '</button>' +
            '<button id="exportPdfBtn" class="btn-primary" style="background:#3b82f6;flex:1;margin:0;">📄 ' + await tt(t('export_pdf'), currentLang) + '</button>' +
            '</div>' +
            '<div class="action-buttons">' +
            '<button class="action-btn" onclick="speakResult()">🔊 ' + await tt(t('listen'), currentLang) + '</button>' +
            '<button class="action-btn" onclick="copyResult()">📋 ' + await tt(t('copy'), currentLang) + '</button>' +
            '<button class="action-btn" onclick="shareResult()">📤 ' + await tt(t('share'), currentLang) + '</button>' +
            '</div>';
        
        resultPanel.innerHTML = html;
        resultPanel.style.display = 'block';
        diagnosisResult = { name: name, sol: sol, confidence: confidence, fault: fault };
        document.getElementById('advisorText').innerText = '✅ ' + name + '. ' + await tt(t('advisor_retry'), currentLang);
        
        saveToHistory(name, sol, confidence, fault.id);
        retryAvailable = true;
        
        document.getElementById('retryDiagnosisBtn').onclick = function() {
            if (retryAvailable) {
                showToast('🔄 إعادة التشخيص مجاناً (دون خصم رصيد)');
                resetAllSensors();
                retryAvailable = false;
            } else {
                showToast('⚠️ يمكنك إعادة التشخيص مجاناً خلال 24 ساعة من آخر تشخيص.');
            }
        };
        
        document.getElementById('exportPdfBtn').onclick = function() {
            var content = '🔧 PhysicSens\n' + t('diag_title') + ': ' + name + '\n' + t('solution') + ': ' + sol + '\n' + t('confidence') + ': ' + confidence + '%\n' + t('severity') + ': ' + sev + '\n' + t('date') + ': ' + new Date().toLocaleString();
            var blob = new Blob([content], { type: 'text/plain' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'diagnostic_physicSens_' + Date.now() + '.txt';
            a.click();
        };
    } catch(e) {
        showToast('⚠️ حدث خطأ أثناء التحليل');
    }
};

// ============================================================
// 16. HISTORY, RESET, ACTIONS
// ============================================================
function saveToHistory(name, solution, confidence, faultId) {
    try {
        var entry = {
            date: new Date().toISOString(),
            name: name,
            solution: solution,
            confidence: confidence,
            faultId: faultId,
            app: currentApp,
            subDevice: currentSubDevice
        };
        diagnosisHistory.unshift(entry);
        if (diagnosisHistory.length > 10) diagnosisHistory.pop();
        localStorage.setItem('physicHistory', JSON.stringify(diagnosisHistory));
        renderHistory();
    } catch(e) {}
}

function renderHistory() {
    try {
        var container = document.getElementById('historyList');
        if (!container) return;
        if (diagnosisHistory.length === 0) {
            container.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:8px;">' + t('no_history') + '</div>';
            return;
        }
        var html = '';
        diagnosisHistory.forEach(function(entry, index) {
            var date = new Date(entry.date);
            var dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
            html +=
                '<div class="entry">' +
                '<span class="date">' + dateStr + '</span> - ' +
                '<span class="result">' + entry.name + '</span> ' +
                '<span style="color:#94a3b8;font-size:0.65rem;">(' + entry.confidence + '%)</span>' +
                '</div>';
        });
        container.innerHTML = html;
    } catch(e) {}
}

function resetAllSensors() {
    try {
        for (var key in sensorResults) { sensorResults[key] = false; }
        for (var key in measuring) { measuring[key] = false; }
        for (var key in sensorData) { sensorData[key] = null; }
        document.querySelectorAll('.sensor-card').forEach(function(card) {
            card.classList.remove('active', 'done', 'result-green', 'result-orange', 'result-red');
        });
        document.querySelectorAll('.sensor-preview').forEach(function(el) {
            if (!el.querySelector('video')) el.innerHTML = '⏳ ' + t('waiting');
        });
        document.querySelectorAll('.sensor-result').forEach(function(el) { el.innerHTML = ''; });
        document.querySelectorAll('#sensorsContainer .btn-group button:first-child').forEach(function(btn) {
            btn.textContent = t('measure');
            btn.disabled = false;
        });
        document.querySelectorAll('#sensorsContainer .btn-group button:last-child').forEach(function(btn) {
            btn.disabled = true;
        });
        document.querySelectorAll('.reading-dot').forEach(function(dot) {
            dot.className = 'reading-dot';
        });
        updateAdvisorText();
        document.getElementById('resultPanel').style.display = 'none';
    } catch(e) {}
}

function speakResult() {
    try {
        if (!diagnosisResult) return;
        var text = diagnosisResult.name + '. ' + diagnosisResult.sol;
        var u = new SpeechSynthesisUtterance(text);
        var langCode = BCP_MAP[currentLang] || 'en-US';
        u.lang = langCode;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    } catch(e) {}
}

function copyResult() {
    try {
        if (!diagnosisResult) return;
        var text = diagnosisResult.name + '\n' + diagnosisResult.sol;
        navigator.clipboard.writeText(text).then(function(){ showToast(t('copied')); });
    } catch(e) {}
}

function shareResult() {
    try {
        if (!diagnosisResult) return;
        var text = '🔧 PhysicSens\n' + diagnosisResult.name + '\n' + diagnosisResult.sol;
        if (navigator.share) {
            navigator.share({ title: 'PhysicSens', text: text, url: window.location.href });
        } else {
            navigator.clipboard.writeText(text + ' ' + window.location.href);
            showToast(t('shared'));
        }
    } catch(e) {}
}
